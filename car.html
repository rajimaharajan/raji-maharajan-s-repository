<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Block Element Car</title>
    <style>
        /* Container for centering the car */
        .car-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .car {
            position: relative;
            width: 300px;
        }

        /* Top part of the car (roof) */
        .car-top {
            width: 150px;
            height: 60px;
            background-color: #3498db;
            margin: 0 auto;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
        }

        /* Main body of the car */
        .car-body {
            width: 300px;
            height: 80px;
            background-color: #2980b9;
            border-radius: 10px;
            position: relative;
            z-index: 1;
        }

        /* Wheels (circles using block elements) */
        .wheel {
            width: 50px;
            height: 50px;
            background-color: #333;
            border-radius: 50%; /* Makes the block a circle */
            position: absolute;
            bottom: -25px;
            border: 3px solid #fff;
        }

        .wheel-left { left: 40px; }
        .wheel-right { right: 40px; }
    </style>
</head>
<body>
    <div class="car-container">
        <div class="car">
            <div class="car-top"></div>
            <div class="car-body">
                <div class="wheel wheel-left"></div>
                <div class="wheel wheel-right"></div>
            </div>
        </div>
    </div>
</body>
</html>
